<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" shape-rendering="crispEdges">
  <!-- Red helmet top -->
  <rect width="8" height="1" fill="#b81c1c"/>
  <rect x="1" y="1" width="6" height="1" fill="#b81c1c"/>
  <!-- Eyes - blue visor -->
  <rect x="1" y="2" width="6" height="1" fill="#1e3a8a"/>
  <rect x="1" y="2" width="2" height="1" fill="#60a5fa"/>
  <rect x="5" y="2" width="2" height="1" fill="#60a5fa"/>
  <!-- Face area - silver/white -->
  <rect x="1" y="3" width="6" height="3" fill="#d1d5db"/>
  <rect x="2" y="3" width="4" height="3" fill="#e5e7eb"/>
  <!-- Nose/mouth area -->
  <rect x="3" y="4" width="2" height="1" fill="#9ca3af"/>
  <rect x="2" y="5" width="4" height="1" fill="#9ca3af"/>
  <!-- Chin - darker -->
  <rect x="2" y="6" width="4" height="1" fill="#b81c1c"/>
  <rect width="8" height="1" fill="#b81c1c"/>
  <rect x="1" y="7" width="6" height="1" fill="#991b1b"/>
</svg>
