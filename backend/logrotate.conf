# Logrotate config for mission-control backend logs
# Usage: logrotate -f backend/logrotate.conf
# Install as a daily cron: 0 0 * * * logrotate -f /path/to/mission-control/backend/logrotate.conf

# Path to your logs directory (matches LOG_DIR env var default)
/home/mangu/Dev/nodejs/mission-control/backend/logs/backend.log {
    # Rotate daily
    daily

    # Keep 14 days of logs (matches pino-roll maxFiles)
    rotate 14

    # Compress old logs with gzip
    compress
    compresscmd /usr/bin/gzip
    uncompresscmd /usr/bin/gunzip
    compressext .gz

    # Don't fail if the log file is missing
    missingok

    # Don't rotate if the log file is empty
    notifempty

    # Run postrotate script to reopen log files (handles pino-roll reopens)
    postrotate
        # Send SIGHUP to the backend process to reopen log files after rotation
        # Adjust the PID file path if you use a different process manager
        # kill -HUP $(cat /var/run/mission-control.pid) 2>/dev/null || true
        true
    endscript
}
