info:
  name: auth
  type: http
  seq: 3

http:
  method: post
  url: http://localhost:3001/api/auth/login
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "password": "YOUR_DASHBOARD_PASSWORD"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
