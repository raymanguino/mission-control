info:
  name: auth
  type: http
  seq: 3

http:
  method: post
  url: http://localhost:3001/api/auth/login
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "password": "{{dashboardPw}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        let data = res.getBody();
        bru.setEnvVar("dashboardJwt", data.token);
        bru.setEnvVar("token", data.token);

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
