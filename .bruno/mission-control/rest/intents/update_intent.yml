info:
  name: update_intent
  type: http
  seq: 4

http:
  method: patch
  url: http://{{host}}:{{port}}/api/intents/{{intentId}}
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "Updated title",
        "body": "Updated body",
        "status": "open",
        "createdProjectId": null
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
