info:
  name: convert_intent_to_project
  type: http
  seq: 5

http:
  method: post
  url: http://{{host}}:{{port}}/api/intents/{{intentId}}/convert
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "projectName": "From intent",
        "projectDescription": "Optional project description"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
