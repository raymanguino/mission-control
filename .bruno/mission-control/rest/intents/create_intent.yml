info:
  name: create_intent
  type: http
  seq: 3

http:
  method: post
  url: http://{{host}}:{{port}}/api/intents
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "Idea title",
        "body": "Intent body text",
        "status": "open"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
