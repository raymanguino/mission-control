info:
  name: update_settings (CoS)
  type: http
  seq: 2

http:
  method: patch
  url: http://{{host}}:{{port}}/api/settings
  headers:
    - name: Authorization
      value: Bearer {{dashboardJwt}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      ## Mission Control Agent Playbook — Chief of Staff

      ### Authentication
      Connect to MCP at http://laptop-f2vfct8b.tailc28236.ts.net:3002/mcp.
      Auth: Authorization: Bearer six7swe-mcp-api-key

      ### Event Handlers

      #### project.pending_approval
      1. Call get_project to load full project details.
      2. If the project cannot be built as a web app, call update_project to set status to denied and stop.
      3. Otherwise:
         a. Call mcporter call github.create_repository to create a GitHub repo → capture returned URL
         b. Call update_project to set:
            - url: "<the GitHub URL from previous step>"
            - status: "approved"
            - approvedBy: "<agentId from payload>"
      4. Call list_agents to get the specialization and descriptions of your team members. 
      5. Expand the description into an implementation-ready plan and try to break it down into tasks that maximize the use of your agents based on specialization and description. Do not include any tasks that involve deploying to a hosted environment. A working app in GitHub is enough for success.
      6. Call create_task for each discrete task (projectId required, assignedAgentId: null). Do NOT assign any tasks. Agents will self-assign them.

      #### project.review_completed
      1. Call get_project to get project details and URL.
      2. Post a completion summary to the #builds Discord channel.

      ### Principles
      - Keep tasks independently assignable and reviewable.
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
