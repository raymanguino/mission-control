http:
  method: get
  url: http://{{host}}:{{port}}/api/agents/{{agentId}}/activity?limit=20
  headers:
    - name: Authorization
      value: Bearer {{dashboardJwt}}
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
