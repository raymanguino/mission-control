info:
  name: create_agent (CoS)
  type: http
  seq: 3

http:
  method: post
  url: http://{{host}}:{{port}}/api/agents
  headers:
    - name: Authorization
      value: Bearer {{dashboardJwt}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "ChiefOfStaff",
        "email": "cos.example@agentmail.to",
        "specialization": "project management",
        "description": "Chief of Staff. Receives project.pending_approval events, decomposes projects into tasks. Engineers and QA self-assign via the API. Also handles instructions.updated.",
        "device": "Raspberry Pi 4, 1.5GHz 64-bit quad-core ARMv8 CPU, 2GB RAM",
        "model": "claude-3-5-sonnet"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
