info:
  name: log_cannabis_session
  type: http
  seq: 6

http:
  method: post
  url: http://{{host}}:{{port}}/api/health/marijuana
  headers:
    - name: Authorization
      value: Bearer {{dashboardJwt}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "form": "flower",
        "sessionAt": "2026-03-28T20:00:00.000Z",
        "date": "2026-03-28",
        "strain": "Optional strain",
        "amount": "0.5",
        "unit": "g",
        "notes": "optional"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
