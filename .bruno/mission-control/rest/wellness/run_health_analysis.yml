info:
  name: run_health_analysis
  type: http
  seq: 13

http:
  method: post
  url: http://{{host}}:{{port}}/api/health/analysis
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "goal": "Improve sleep quality",
        "goals": [
          "Track meals more consistently"
        ]
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
