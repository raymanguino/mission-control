info:
  name: create_task
  type: http
  seq: 8

http:
  method: post
  url: http://{{host}}:{{port}}/api/projects/{{projectId}}/tasks
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "Implement feature",
        "description": "Task details",
        "status": "backlog"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
