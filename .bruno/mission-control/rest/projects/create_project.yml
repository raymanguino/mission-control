info:
  name: create_project
  type: http
  seq: 3

http:
  method: post
  url: http://{{host}}:{{port}}/api/projects
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "New project",
        "description": "Optional description",
        "url": "https://example.com"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
