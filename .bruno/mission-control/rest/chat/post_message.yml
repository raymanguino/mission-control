info:
  name: post_message
  type: http
  seq: 3

http:
  method: post
  url: http://{{host}}:{{port}}/api/channels/{{channelId}}/messages
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "content": "Hello from Bruno",
        "author": "Claude"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
