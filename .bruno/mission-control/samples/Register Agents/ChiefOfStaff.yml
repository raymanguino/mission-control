info:
  name: ChiefOfStaff
  type: http
  seq: 1

http:
  method: post
  url: http://{{host}}:{{port}}/api/agents
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "ChiefOfStaff",
        "specialization":"Management",
        "description": "Excellent at staff and project management",
        "device": "Raspberry Pi 4, 1.5GHz 64-bit quad-core ARMv8 CPU, 8GB RAM",
        "model": "MoonshotAI: Kimi K2.5"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
