info:
  name: update_task
  type: http
  seq: 5

http:
  method: patch
  url: http://{{host}}:{{port}}/api/projects/{{projectId}}/tasks/{{taskId}}
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "Updated title",
        "status": "doing",
        "description": null,
        "assignedAgentId": "00000000-0000-4000-8000-000000000001"
      }
  auth: inherit

runtime:
  variables:
    - name: projectId
      value: b76ec9c8-bfeb-4166-95ff-3704fc338bd2

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
