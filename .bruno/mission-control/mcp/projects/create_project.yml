info:
  name: create_project
  type: http
  seq: 2

http:
  method: post
  url: http://{{host}}:{{port}}/api/projects
  headers:
    - name: Authorization
      value: Bearer {{dashboardJwt}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Hello World",
        "description": "Create a Hello World web app. The user should be able to enter a name and receive back a greeting.",
        "url": ""
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
