info:
  name: update_project
  type: http
  seq: 3

http:
  method: patch
  url: http://{{host}}:{{port}}/api/projects/{{projectId}}
  headers:
    - name: Authorization
      value: Bearer {{dashboardJwt}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Updated project name",
        "description": "Updated optional description",
        "status": "approved",
        "approvedByAgentId": "6fe64e94-edbd-428f-8fd5-fad96250a762"
      }
  auth: inherit

runtime:
  variables:
    - name: projectId
      value: 3a0fa54d-8bef-4895-a836-762a130082ed

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
