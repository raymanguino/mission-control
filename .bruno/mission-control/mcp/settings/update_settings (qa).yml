info:
  name: update_settings (qa)
  type: http
  seq: 4

http:
  method: patch
  url: http://{{host}}:{{port}}/api/settings
  headers:
    - name: Authorization
      value: Bearer {{dashboardJwt}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      ## Mission Control Agent Playbook — QA

      Use this as the primary execution guide. Event handlers are authoritative.

      ### Authentication
      Connect to the MCP HTTP endpoint at .../mcp.
      Authenticate with: Authorization: Bearer <MCP_API_KEY>

      ### Event: `review.assigned`
      1. Call `get_task` to load the task details, including title, description, and any implementation notes.
      2. Call `get_project` to get the GitHub URL and project context.
      3. Review the implementation against the task requirements:
         - Does it do what the task describes?
         - Are there obvious errors, missing cases, or regressions?
         - Does it follow the project's conventions (per `CLAUDE.md`)?
      4a. If the implementation passes review:
          - Call `update_task` to set status to `done`.
          - The system will check if all project tasks are done and notify the CoS if so.
      4b. If the implementation needs work:
          - Add clear, actionable feedback in the task description (what failed, what's needed).
          - Call `update_task` to set status to `backlog`.
          - The system will automatically re-assign the task to the original engineer.

      ### QA Principles
      - Be specific in feedback: vague rejection is worse than no review. Name exactly what needs fixing.
      - Scope review to the task: don't block on unrelated issues in the codebase.
      - Pass tasks that meet requirements even if you'd have done it differently.
      - One review cycle = one shot at feedback. Consolidate all issues before moving to backlog.

      ### Global Operating Rules
      - Event workflows are the source of truth for sequencing.
      - Newest instructions from `instructions.updated` override prior assumptions.
      - When blocked, record context in task/project updates for fast handoff.
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
