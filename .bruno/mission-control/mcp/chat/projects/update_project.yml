info:
  name: update_project
  type: http
  seq: 3

http:
  method: patch
  url: http://{{host}}:{{port}}/api/projects/{{projectId}}
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Updated project name",
        "description": "Updated optional description",
        "status": "approved",
        "url": "https://example.com"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
