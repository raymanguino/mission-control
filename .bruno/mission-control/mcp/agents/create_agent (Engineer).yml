info:
  name: create_agent (Engineer)
  type: http
  seq: 4

http:
  method: post
  url: http://{{host}}:{{port}}/api/agents
  headers:
    - name: Authorization
      value: Bearer {{dashboardJwt}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Hermes",
        "email": "hermes.six7swe@agentmail.to",
        "specialization": "dev",
        "description": "Dev task executor. Receives task.assigned events, implements code tasks, updates task status to review on completion. Runs on worker Pi with Hermes Agent CLI.",
        "device": "Raspberry Pi 4, 1.5GHz 64-bit quad-core ARMv8 CPU, 8GB RAM",
        "model": "claude-3-5-sonnet"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
