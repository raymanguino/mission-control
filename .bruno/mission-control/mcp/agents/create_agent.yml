info:
  name: create_agent
  type: http
  seq: 3

http:
  method: post
  url: http://{{host}}:{{port}}/api/agents
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Agent Beta",
        "email": "agent2@example.com",
        "specialization": "Frontend React",
        "description": "Senior full-stack software engineer specializing in front end",
        "device": "Laptop",
        "ip": "192.168.1.10"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
