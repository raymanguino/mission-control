info:
  name: create_agent
  type: http
  seq: 3

http:
  method: post
  url: http://{{host}}:{{port}}/api/agents
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Agent Alpha",
        "email": "agent@example.com",
        "specialization": "Frontend React",
        "description": "Detailed skills profile",
        "device": "Laptop",
        "ip": "192.168.1.10"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        bru.setEnvVar('agentId', data.id);

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
