info:
  name: update_agent
  type: http
  seq: 4

http:
  method: patch
  url: http://{{host}}:{{port}}/api/agents/{{agentId}}
  headers:
    - name: Authorization
      value: Bearer {{dashboardJwt}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "orgRole": "qa"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
