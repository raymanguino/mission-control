info:
  name: quick_log_food
  type: http
  seq: 3

http:
  method: post
  url: http://{{host}}:{{port}}/api/health/food/quick
  headers:
    - name: Authorization
      value: Bearer {{dashboardJwt}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "text": "Oatmeal with berries this morning"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
